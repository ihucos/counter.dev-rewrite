services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres

  redis:
    build:
      context: ./redis
      dockerfile: Dockerfile
    platform: linux/arm64
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    platform: linux/arm64
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data:

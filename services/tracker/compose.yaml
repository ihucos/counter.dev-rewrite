services:
  tracker:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      - redis
    environment:
      WEBSTATS_BIND: ":8001"
      WEBSTATS_REDIS_URL: "redis://redis:6379"
    develop:
      watch:
        - action: rebuild
          path: .

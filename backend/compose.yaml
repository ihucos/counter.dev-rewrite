services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .venv/
        - action: rebuild
          path: pyproject.toml
        - action: rebuild
          path: Dockerfile

  sync:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    command: ["uv", "run", "python", "manage.py", "sync", "--forever", "--sleep", "1"]
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .venv/
        - action: rebuild
          path: pyproject.toml
        - action: rebuild
          path: Dockerfile
